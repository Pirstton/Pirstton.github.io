<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pirstton - Plantilla base</title>
  <style>
    /* =========================================================
       01. RESET GENERAL
    ========================================================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* =========================================================
       02. BASE DEL DOCUMENTO
    ========================================================= */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(rgba(0,0,0,0.06), rgba(0,0,0,0.06)),
        url("fondodeplantilla.webp") no-repeat center center;
      background-size: cover;
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
      padding: 18px;
    }

    /* =========================================================
       03. CONTENEDOR PRINCIPAL
    ========================================================= */
    .frame {
      width: min(1460px, 95vw, calc((100vh - 36px) * 768 / 442));
      aspect-ratio: 768 / 442;
      background: #0d0c10;
      position: relative;
      overflow: hidden;
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.22);
      border: 4px solid rgba(55, 53, 61, 0.95);
    }

    /* =========================================================
       04. BARRA SUPERIOR
    ========================================================= */
    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 58px;
      border-bottom: 1px solid rgba(160, 147, 131, 0.16);
      background: #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 34px;
      z-index: 20;
      backdrop-filter: blur(1px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #f5f2ee;
      flex-shrink: 0;
      position: relative;
      z-index: 20;
    }

    .brand-text {
      display: inline-flex;
      gap: 1px;
      font-size: 16px;
      letter-spacing: 2.2px;
      color: #f6f2ef;
      perspective: 700px;
    }

    .brand-text span {
      display: inline-block;
      text-shadow: 0 1px 0 rgba(0,0,0,0.35);
      transition: transform 0.22s ease, color 0.22s ease;
      will-change: transform;
    }

    .brand:hover .brand-text span {
      transform: translateY(-1px);
      color: #d49c6d;
    }

    /* =========================================================
       04.A. LOGO ANIMADO PIRSTTON
    ========================================================= */
    .brand-logo {
      width: 36px;
      height: 36px;
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 36px;
      border-radius: 50%;
      overflow: hidden;
      isolation: isolate;
      background: rgba(255,255,255,0.02);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
    }

    .brand-logo::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), transparent 58%);
      z-index: 0;
      pointer-events: none;
    }

    .brand-logo-layer {
      position: absolute;
      inset: 0;
      background-image: url("logo.webp");
      background-repeat: no-repeat;
      background-position: center;
      background-size: 100% 100%;
      transform: translate3d(-24px, 0, 0) scale(0.88);
      opacity: 0;
      will-change: transform, opacity;
      backface-visibility: hidden;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.18));
    }

    .brand-logo-layer.layer-back {
      clip-path: polygon(0 0, 48% 0, 42% 100%, 0 100%);
      animation: logoLayerBack 7s cubic-bezier(0.22, 1, 0.36, 1) infinite;
      z-index: 1;
    }

    .brand-logo-layer.layer-middle {
      clip-path: polygon(24% 0, 76% 0, 68% 100%, 17% 100%);
      animation: logoLayerMiddle 7s cubic-bezier(0.22, 1, 0.36, 1) infinite;
      z-index: 2;
    }

    .brand-logo-layer.layer-front {
      clip-path: polygon(52% 0, 100% 0, 100% 100%, 43% 100%);
      animation: logoLayerFront 7s cubic-bezier(0.22, 1, 0.36, 1) infinite;
      z-index: 3;
    }

    .brand-logo-shine {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent 42%, transparent 68%, rgba(255,255,255,0.08));
      mix-blend-mode: screen;
      opacity: 0;
      z-index: 4;
      pointer-events: none;
      animation: logoShine 7s ease-in-out infinite;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 22px;
      font-size: 12px;
      color: rgba(255,255,255,0.84);
      margin-left: auto;
      margin-right: 350px;
      padding-right: 0px;
    }

    .nav a {
      text-decoration: none;
      color: inherit;
      opacity: 0.92;
    }

    .nav a:last-child {
      display: none;
    }

    /* Botón superior derecho: Pirstton Kids */
    .kids-button {
      position: absolute;
      top: 6px;
      right: 26px;
      width: 266px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 20px 0 88px;
      border-radius: 16px;
      border: 2px solid rgba(255, 241, 211, 0.92);
      background:
        radial-gradient(circle at 28% 30%, rgba(255,255,255,0.18), transparent 28%),
        linear-gradient(135deg, #ffb458 0%, #f0a14a 35%, #f8a54e 60%, #ebb04d 100%);
      color: #fff;
      text-decoration: none;
      overflow: visible;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.16) inset, 0 10px 20px rgba(255, 163, 74, 0.20), 0 0 18px rgba(255, 193, 92, 0.26);
      z-index: 24;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      isolation: isolate;
    }

    .kids-button::before {
      content: "";
      position: absolute;
      left: 14px;
      top: 50%;
      width: 54px;
      height: 54px;
      transform: translateY(-50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 58%, #ffffff 0 61%, transparent 62%),
        radial-gradient(circle at 50% 50%, #ffb45a 0 100%);
      box-shadow: 0 6px 12px rgba(0,0,0,0.16);
      z-index: 1;
    }

    .kids-button::after {
      content: "";
      position: absolute;
      left: 27px;
      top: -5px;
      width: 18px;
      height: 18px;
      background: #ffd468;
      border-radius: 50% 50% 32% 32%;
      box-shadow: 10px 4px 0 0 #ffd468;
      transform: rotate(-18deg);
      z-index: 2;
    }

    .kids-button .kids-label {
      display: flex;
      align-items: baseline;
      gap: 9px;
      position: relative;
      z-index: 3;
    }

    .kids-button .kids-mini {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: #fff7ef;
      text-shadow: 0 1px 0 rgba(0,0,0,0.14);
    }

    .kids-button .kids-big {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.6px;
      color: #fff063;
      text-shadow: 0 1px 0 rgba(150,78,0,0.18);
    }

    .kids-button .sparkle,
    .kids-button .sparkle::before,
    .kids-button .sparkle::after {
      position: absolute;
      width: 7px;
      height: 7px;
      background: rgba(255,255,255,0.92);
      clip-path: polygon(50% 0, 62% 38%, 100% 50%, 62% 62%, 50% 100%, 38% 62%, 0 50%, 38% 38%);
      animation: kidsSpark 2.1s ease-in-out infinite;
    }

    .kids-button .sparkle {
      right: 14px;
      top: 6px;
    }

    .kids-button .sparkle::before,
    .kids-button .sparkle::after {
      content: "";
    }

    .kids-button .sparkle::before {
      right: 18px;
      top: 16px;
      animation-delay: 0.4s;
    }

    .kids-button .sparkle::after {
      right: 34px;
      top: -2px;
      animation-delay: 0.8s;
    }

    .kids-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(255, 163, 74, 0.24), 0 0 20px rgba(255, 193, 92, 0.30);
    }

    /* =========================================================
       05. DETALLES DECORATIVOS SUPERIORES
    ========================================================= */
    .left-divider {
      position: absolute;
      top: 0;
      left: 114px;
      width: 1px;
      height: 58px;
      background: rgba(200, 193, 184, 0.42);
      z-index: 12;
    }

    .top-circle {
      position: absolute;
      top: -18px;
      left: 135px;
      width: 84px;
      height: 84px;
      border: 1px solid rgba(155, 102, 53, 0.34);
      border-radius: 50%;
      z-index: 12;
    }

    /* =========================================================
       06. PANEL OSCURO DERECHO
    ========================================================= */
    .dark-panel {
      display: none;
    }

    /* =========================================================
       07. ZONA HERO
    ========================================================= */
    .hero {
      position: absolute;
      inset: 58px 0 0 0;
      z-index: 2;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.02) 0%, rgba(0,0,0,0.15) 36%, rgba(0,0,0,0.3) 64%, rgba(0,0,0,0.1) 100%),
        linear-gradient(180deg, rgba(11,11,14,0.03) 0%, rgba(11,11,14,0.06) 100%);
      z-index: 3;
      pointer-events: none;
    }

    /* =========================================================
       08. TITULAR PRINCIPAL
    ========================================================= */
    .title {
      position: absolute;
      left: 88px;
      top: 78px;
      line-height: 0.92;
      z-index: 10;
    }

    .title .line1 {
      display: block;
      font-size: clamp(44px, 4.2vw, 64px);
      font-weight: 900;
      letter-spacing: 1px;
      color: #bfbfc1;
      text-shadow: none;
    }

    .title .line2 {
      display: block;
      margin-top: 6px;
      font-size: clamp(42px, 4vw, 60px);
      font-weight: 300;
      color: #c98d59;
      letter-spacing: 1px;
    }

    /* =========================================================
       09. TEXTO DESCRIPTIVO Proyecto integral..
    ========================================================= */
    .desc {
      position: absolute;
      left: 90px;
      top: 205px;
      width: 325px;
      font-size: 13px;
      line-height: 1.95;
      color: rgba(191, 183, 175, 0.78);
      z-index: 10;
    }

    /* =========================================================
       10. BOTONES LADO IZQUIERDO
    ========================================================= */
    .button-stack {
      position: absolute;
      left: 90px;
      top: 242px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 11;
    }

    .hero-button {
      min-width: 198px;
      border: 1px solid rgba(112, 101, 90, 0.35);
      padding: 11px 18px;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.7px;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      position: relative;
      overflow: hidden;
    }

    .hero-button.primary {
      background: rgba(12, 12, 14, 0.84);
      color: #fff;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .hero-button.secondary {
      background: #c39267;
      color: #fff7f0;
      box-shadow: 0 8px 18px rgba(0,0,0,0.14);
    }

    .hero-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.20);
    }

    .hero-button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,0.06) 32%, rgba(255,255,255,0.18) 48%, rgba(255,255,255,0.06) 64%, transparent 100%);
      transform: translateX(-135%);
      transition: transform 0.55s ease;
    }

    .hero-button:hover::before {
      transform: translateX(135%);
    }

    /* =========================================================
       11. TARJETA 50% OFF
    ========================================================= */
    .discount {
      position: absolute;
      left: 320px;
      top: 238px;
      width: 158px;
      height: 56px;
      background: #c39267;
      color: #fff4eb;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 18px;
      font-weight: 700;
      z-index: 12;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.16);
    }

    .discount span {
      font-weight: 300;
      margin-left: 1px;
    }

    /* =========================================================
       12. IMAGEN PRINCIPAL COMO FONDO HERO
    ========================================================= */
    .photo {
      position: absolute;
      inset: 0;
      border: none;
      overflow: hidden;
      z-index: 1;
      box-shadow: none;
      background: #101014;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: right center;
      display: block;
     
    }

    .photo-placeholder {
      display: none;
    }

    /* =========================================================
       13. ESTADÍSTICAS INFERIORES
    ========================================================= */
    .stats {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 36px;
      width: 760px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 34px;
      z-index: 12;
      color: #bf8654;
    }

    .stat {
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }

    .stat strong {
      font-size: 20px;
      line-height: 1;
      font-weight: 700;
    }

    .stat span {
      font-size: 9px;
      line-height: 1.15;
      color: rgba(210, 210, 210, 0.92);
      text-transform: uppercase;
      letter-spacing: 0.45px;
    }

    .sep {
      width: 1px;
      height: 28px;
      background: rgba(205, 183, 165, 0.42);
    }

    /* =========================================================
       14. DETALLES DECORATIVOS INFERIORES Y LATERALES
    ========================================================= */
    .line-accent {
      position: absolute;
      left: 90px;
      bottom: 104px;
      width: 210px;
      height: 10px;
      background: #c39267;
      z-index: 12;
    }

    .left-block {
      position: absolute;
      left: 0;
      top: 128px;
      width: 12px;
      height: 72px;
      background: #c39267;
      z-index: 12;
    }

    .outline-box {
      position: absolute;
      left: -24px;
      top: 206px;
      width: 54px;
      height: 96px;
      border: 1px solid rgba(172, 177, 183, 0.55);
      background: rgba(8, 8, 10, 0.42);
      z-index: 12;
    }

    .mid-outline {
      position: absolute;
      left: 420px;
      top: 238px;
      width: 250px;
      height: 56px;
      border: 1px solid rgba(194, 183, 171, 0.36);
      z-index: 11;
    }

    .dots1,
    .dots2,
    .dots3,
    .dots4 {
      position: absolute;
      display: grid;
      grid-template-columns: repeat(3, 4px);
      gap: 4px;
      z-index: 12;
    }

    .dots1 span,
    .dots2 span,
    .dots3 span,
    .dots4 span {
      width: 2px;
      height: 2px;
      background: rgba(208, 199, 188, 0.54);
      display: block;
    }

    .dots1 {
      left: 640px;
      top: 96px;
    }

    .dots2 {
      left: 54px;
      top: 356px;
    }

    .dots3 {
      left: 596px;
      top: 96px;
    }

    .dots4 {
      right: 98px;
      top: 128px;
      grid-template-columns: repeat(2, 4px);
      gap: 6px 6px;
    }

    .dots4 span {
      background: rgba(195, 146, 103, 0.84);
    }

    .mini-lines {
      position: absolute;
      left: 566px;
      top: 88px;
      display: flex;
      gap: 4px;
      z-index: 12;
    }

    .mini-lines span {
      width: 1px;
      height: 10px;
      background: rgba(218, 215, 209, 0.48);
      display: block;
    }

    .bottom-lines {
      position: absolute;
      left: 122px;
      bottom: 38px;
      display: flex;
      gap: 5px;
      z-index: 12;
    }

    .bottom-lines span {
      width: 1px;
      height: 10px;
      background: rgba(224, 221, 216, 0.46);
      display: block;
    }

    .big-circle {
      position: absolute;
      right: -40px;
      bottom: -54px;
      width: 170px;
      height: 170px;
      border: 1px solid rgba(155, 113, 84, 0.74);
      border-radius: 50%;
      z-index: 12;
    }

    .small-circle {
      position: absolute;
      left: -18px;
      bottom: 36px;
      width: 28px;
      height: 28px;
      border: 1px solid rgba(158, 158, 158, 0.56);
      border-radius: 50%;
      z-index: 12;
    }

    /* =========================================================
       15. ANIMACIONES PRINCIPALES
    ========================================================= */
    .title,
    .desc,
    .button-stack,
    .stats,
    .photo,
    .discount,
    .stat,
    .line-accent,
    .left-block,
    .outline-box,
    .mid-outline,
    .top-circle,
    .big-circle,
    .small-circle,
    .dots1,
    .dots2,
    .dots3,
    .dots4,
    .mini-lines,
    .bottom-lines,
    .brand-text span {
      animation: none !important;
    }

    @keyframes kidsSpark {
      0%, 100% { transform: scale(0.6) rotate(0deg); opacity: 0.55; }
      50% { transform: scale(1.15) rotate(30deg); opacity: 1; }
    }


    @keyframes logoLayerBack {
      0%, 8% {
        transform: translate3d(-24px, 0, 0) scale(0.88);
        opacity: 0;
      }
      13% {
        transform: translate3d(1px, 0, 0) scale(1.03);
        opacity: 1;
      }
      16% {
        transform: translate3d(-1px, 0, 0) scale(0.98);
        opacity: 1;
      }
      19%, 100% {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 1;
      }
    }

    @keyframes logoLayerMiddle {
      0%, 12% {
        transform: translate3d(-24px, 0, 0) scale(0.88);
        opacity: 0;
      }
      18% {
        transform: translate3d(1px, 0, 0) scale(1.04);
        opacity: 1;
      }
      21% {
        transform: translate3d(-1px, 0, 0) scale(0.985);
        opacity: 1;
      }
      24%, 100% {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 1;
      }
    }

    @keyframes logoLayerFront {
      0%, 16% {
        transform: translate3d(-24px, 0, 0) scale(0.88);
        opacity: 0;
      }
      23% {
        transform: translate3d(1px, 0, 0) scale(1.06);
        opacity: 1;
      }
      26% {
        transform: translate3d(-1px, 0, 0) scale(0.99);
        opacity: 1;
      }
      29%, 100% {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 1;
      }
    }

    @keyframes logoShine {
      0%, 26% {
        opacity: 0;
        transform: translateX(-20%) scale(0.96);
      }
      31% {
        opacity: 0.95;
        transform: translateX(0) scale(1);
      }
      37%, 100% {
        opacity: 0.12;
        transform: translateX(0) scale(1);
      }
    }

    /* =========================================================
       16. RESPONSIVE TABLET
    ========================================================= */
    @media (max-width: 900px) {
      .frame {
        aspect-ratio: auto;
        min-height: 760px;
      }

      .nav {
        padding-right: 230px;
        gap: 18px;
      }

      .title {
        left: 42px;
      }

      .desc,
      .button-stack,
      .line-accent {
        left: 44px;
      }

      .discount {
        left: 265px;
      }

      .mid-outline {
        left: 360px;
        width: 210px;
      }

      .stats {
        width: calc(100% - 60px);
        gap: 14px;
        flex-wrap: wrap;
      }
    }

    /* =========================================================
       17. RESPONSIVE MÓVIL
    ========================================================= */
    @media (max-width: 700px) {
      body {
        padding: 12px;
      }

      .frame {
        width: 100%;
        min-height: 980px;
      }

      .topbar {
        height: auto;
        padding: 16px 18px 70px;
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .nav {
        flex-wrap: wrap;
        gap: 12px 18px;
        padding-right: 0;
        margin-left: 0;
      }

      .kids-button {
        top: auto;
        bottom: 16px;
        right: 18px;
        width: 210px;
        height: 42px;
      }

      .left-divider,
      .top-circle,
      .big-circle,
      .outline-box,
      .mid-outline,
      .small-circle,
      .mini-lines,
      .dots1,
      .dots2,
      .dots3,
      .dots4 {
        display: none;
      }

      .hero {
        inset: 126px 0 0 0;
      }

      .title {
        left: 22px;
        top: 24px;
      }

      .desc {
        left: 24px;
        top: 128px;
        width: calc(100% - 48px);
      }

      .button-stack {
        left: 24px;
        top: 198px;
      }

      .discount {
        left: 24px;
        top: 355px;
      }

      .line-accent {
        left: 24px;
        bottom: 174px;
        width: 180px;
      }

      .stats {
        width: calc(100% - 48px);
        bottom: 28px;
      }
    
        }
    }
  </style>
</head>
<body>
  <div class="frame">
    <!-- =======================================================
         BARRA SUPERIOR
    ======================================================== -->
    <div class="topbar">
      <div class="brand">
        <span class="brand-logo" aria-hidden="true">
          <span class="brand-logo-layer layer-back"></span>
          <span class="brand-logo-layer layer-middle"></span>
          <span class="brand-logo-layer layer-front"></span>
          <span class="brand-logo-shine"></span>
        </span>
        <span class="brand-text" aria-label="Pirstton">
          <span>P</span><span>I</span><span>R</span><span>S</span><span>T</span><span>T</span><span>O</span><span>N</span>
        </span>
      </div>

      <nav class="nav">
        <a href="#">Home</a>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Resultados - PIRSTTON</title>

<style>
/* CSS va aquí */
body {
  font-family: Arial;
  background: #f5f5f5;
  text-align: center;
  padding: 50px;
}

.container {
  background: white;
  padding: 30px;
  max-width: 400px;
  margin: auto;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
}

button {
  padding: 10px 20px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

#resultado {
  margin-top: 20px;
  font-weight: bold;
}
</style>

</head>
<body>

<!-- HTML va aquí -->
<div class="container">
  <h2>Consulta de Puntaje</h2>

  <input type="text" id="nombre" placeholder="Nombre del estudiante">
  <input type="text" id="codigo" placeholder="Código">

  <button onclick="buscar()">Buscar</button>

  <div id="resultado"></div>
</div>

<script>
/* JS va aquí */
function buscar() {
  let nombre = document.getElementById("nombre").value.toLowerCase();
  let codigo = document.getElementById("codigo").value;

  if (nombre === "juan" && codigo === "123") {
    document.getElementById("resultado").innerHTML = "Puntaje: 18";
  } else if (nombre === "ana" && codigo === "456") {
    document.getElementById("resultado").innerHTML = "Puntaje: 20";
  } else {
    document.getElementById("resultado").innerHTML = "Alumno no encontrado";
  }
}
</script>

</body>
</html>
